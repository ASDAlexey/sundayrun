name: CI / Deploy

on:
  push:
    branches: [main]
    # Publications commit under data/ and MUST rebuild: JSON is read live through jsDelivr, but the
    # SQLite db is bundled into the Pages deploy (same-origin range reads — the public CDNs mangle
    # ranges), so a data change reaches db readers only once the deploy carries the new file.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel superseded PR runs only: a push to main must never kill an in-flight deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check (Prettier)
        run: bun run prettier:check

      - name: Lint (ESLint)
        run: bun run eslint

      - name: Lint (Stylelint)
        run: bun run stylelint:check

      - name: Circular dependencies (madge)
        run: bun run madge

      - name: Unit tests + 100% coverage
        run: bun run test:coverage

  build:
    needs: quality
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (RU)
        run: bun run build -- --base-href "/${{ github.event.repository.name }}/"

      # The app opens data/sundayrun-<sha>.db for the sha version.json names: a publication
      # changes the name, so no cache — browser or Fastly — can answer for it stale. The plain
      # name stays as the fallback read while the deploy carrying a publication is in flight,
      # and the missing sha-named file is what drives the "results are updating" banner.
      - name: Bundle sha-named db copy
        run: |
          sha=$(jq -r '.sha' data/version.json)
          cp dist/parkrun/browser/ru/data/sundayrun.db "dist/parkrun/browser/ru/data/sundayrun-${sha}.db"

      - name: Smoke-check build output
        run: |
          test -f dist/parkrun/browser/ru/index.html
          grep -q 'base href="/${{ github.event.repository.name }}/ru/"' dist/parkrun/browser/ru/index.html
          # the db must ship inside the deploy — the app reads it same-origin, base-href relative
          test -f dist/parkrun/browser/ru/data/sundayrun.db
          test -f "dist/parkrun/browser/ru/data/sundayrun-$(jq -r '.sha' data/version.json).db"

      - name: Add root redirect to RU locale
        run: |
          cat > dist/parkrun/browser/index.html <<'EOF'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="utf-8" />
              <title>Воскресный парковый пробег</title>
              <meta http-equiv="refresh" content="0; url=./ru/" />
              <link rel="canonical" href="./ru/" />
              <script>
                location.replace('./ru/');
              </script>
            </head>
            <body>
              <a href="./ru/">Перейти к приложению</a>
            </body>
          </html>
          EOF

      # spa-github-pages: Pages serves 404.html for unknown deep links (e.g. /parkrun/ru/races/…
      # after a refresh; prerendered pages are served directly and never hit this). Remember the
      # requested url and bounce to the CSR shell — not the prerendered home, whose hydration
      # would mismatch the restored route — and let the inline script in src/index.html restore
      # the route before Angular bootstraps.
      - name: Add SPA 404 fallback
        run: |
          cat > dist/parkrun/browser/404.html <<'EOF'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="utf-8" />
              <title>Воскресный парковый пробег</title>
              <script>
                // sessionStorage may be unavailable (private mode, blocked cookies); the bounce must still happen.
                try {
                  sessionStorage.setItem('parkrun:spa-redirect', location.pathname + location.search + location.hash);
                } catch (storageError) {}
                location.replace('/${{ github.event.repository.name }}/ru/index.csr.html');
              </script>
            </head>
            <body></body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/parkrun/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
