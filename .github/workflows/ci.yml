name: CI / Deploy

on:
  push:
    branches: [main]
    # Publications commit under data/ and MUST rebuild: JSON is read live through jsDelivr, but the
    # SQLite db is bundled into the Pages deploy (same-origin range reads — the public CDNs mangle
    # ranges), so a data change reaches db readers only once the deploy carries the new file.
  pull_request:
  workflow_dispatch:

permissions:
  # `contents: write` lets the deploy job push the auto version bump back to main.
  contents: write
  pages: write
  id-token: write

# Cancel superseded PR runs only: a push to main must never kill an in-flight deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Publications push only data/** (source.xlsx, the db, version.json) — never source code.
  # This job flags whether anything OUTSIDE data/ changed, so the heavy quality gate below can be
  # skipped for a plain publication while still running in full on code pushes and every PR.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect non-data changes
        id: filter
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          # Non-push events (PR, manual dispatch) always run the full quality gate.
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # New branch / unknown base — no reliable diff, so run quality to be safe.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Skip lint/tests only when every changed file lives under data/.
          if git diff --name-only "$BEFORE" "$AFTER" | grep -qvE '^data/'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check (Prettier)
        run: bun run prettier:check

      - name: Lint (ESLint)
        run: bun run eslint

      - name: Lint (Stylelint)
        run: bun run stylelint:check

      - name: Circular dependencies (madge)
        run: bun run madge

      - name: Unit tests + 100% coverage
        run: bun run test:coverage

  build:
    needs: [changes, quality]
    # Deploy on non-PR main pushes. `always()` lets the build run when quality was skipped for a
    # data-only publication, while the guards below still block it if quality actually failed or the
    # change detection itself errored (fail closed — a broken detector must not ship untested code).
    if: >-
      always()
      && github.event_name != 'pull_request'
      && github.ref == 'refs/heads/main'
      && needs.changes.result == 'success'
      && (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Bump the patch version on a code push (never a data-only publication) and push it back to
      # main. `[skip ci]` keeps the bump commit from re-triggering this workflow. The build below
      # then bakes the new number into the bundle via `write-version.ts`.
      - name: Bump version on code change
        if: needs.changes.outputs.code == 'true'
        run: |
          version=$(bun scripts/bump-version.ts)
          bun scripts/write-version.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src/app/core/app-version.constant.ts
          git commit -m "chore: bump version to ${version} [skip ci]" --no-verify
          git push origin HEAD:main

      - name: Build
        run: bun run build -- --base-href "/${{ github.event.repository.name }}/"

      # The app opens data/sundayrun-<sha>.db for the sha version.json names: a publication
      # changes the name, so no cache — browser or Fastly — can answer for it stale. The plain
      # name stays as the fallback read while the deploy carrying a publication is in flight,
      # and the missing sha-named file is what drives the "results are updating" banner.
      - name: Bundle sha-named db copy
        run: |
          sha=$(jq -r '.sha' data/version.json)
          cp dist/parkrun/browser/data/sundayrun.db "dist/parkrun/browser/data/sundayrun-${sha}.db"

      - name: Smoke-check build output
        run: |
          test -f dist/parkrun/browser/index.html
          grep -q 'base href="/${{ github.event.repository.name }}/"' dist/parkrun/browser/index.html
          # the db must ship inside the deploy — the app reads it same-origin, base-href relative
          test -f dist/parkrun/browser/data/sundayrun.db
          test -f "dist/parkrun/browser/data/sundayrun-$(jq -r '.sha' data/version.json).db"

      # spa-github-pages: Pages serves 404.html for unknown deep links (e.g. /parkrun/races/…
      # after a refresh; prerendered pages are served directly and never hit this). Remember the
      # requested url and bounce to the CSR shell — not the prerendered home, whose hydration
      # would mismatch the restored route — and let the inline script in src/index.html restore
      # the route before Angular bootstraps.
      - name: Add SPA 404 fallback
        run: |
          cat > dist/parkrun/browser/404.html <<'EOF'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="utf-8" />
              <title>Воскресный парковый пробег</title>
              <script>
                // sessionStorage may be unavailable (private mode, blocked cookies); the bounce must still happen.
                try {
                  sessionStorage.setItem('parkrun:spa-redirect', location.pathname + location.search + location.hash);
                } catch (storageError) {}
                location.replace('/${{ github.event.repository.name }}/index.csr.html');
              </script>
            </head>
            <body></body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/parkrun/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
