<span [class]="classes()">
  <svg aria-hidden="true" class="year-badge__art" viewBox="0 0 48 60">
    @switch (art()) {
      @case (arts.wheel) {
        <circle class="year-badge__wheel-track" cx="24" cy="28" r="15" />
        <circle class="year-badge__wheel-segments" cx="24" cy="28" pathLength="96" r="15" transform="rotate(-90 24 28)" />
        <text class="year-badge__wheel-count" dominant-baseline="central" text-anchor="middle" x="24" y="28.5">12</text>
      }
      @case (arts.flake) {
        <polygon class="year-badge__flake-plate" points="24,9 40.5,18.5 40.5,37.5 24,47 7.5,37.5 7.5,18.5" />
        <g class="year-badge__flake">
          <path d="M24 15 L24 41 M20 19 L24 23 L28 19 M20 37 L24 33 L28 37" />
          <path d="M24 15 L24 41 M20 19 L24 23 L28 19 M20 37 L24 33 L28 37" transform="rotate(60 24 28)" />
          <path d="M24 15 L24 41 M20 19 L24 23 L28 19 M20 37 L24 33 L28 37" transform="rotate(120 24 28)" />
        </g>
      }
      @case (arts.crown) {
        <path class="year-badge__crown" d="M8 37 L8 20 L16.5 27.5 L24 15 L31.5 27.5 L40 20 L40 37 Z" />
        <rect class="year-badge__crown-band" height="4" rx="1.5" width="32" x="8" y="39" />
        <circle class="year-badge__crown-gem" cx="24" cy="31" r="2.4" />
      }
      @case (arts.podium) {
        <rect class="year-badge__podium-step year-badge__podium-step_second" height="16" rx="1" width="12" x="5" y="27" />
        <rect class="year-badge__podium-step year-badge__podium-step_first" height="23" rx="1" width="12" x="18" y="20" />
        <rect class="year-badge__podium-step year-badge__podium-step_third" height="12" rx="1" width="12" x="31" y="31" />
      }
      @case (arts.laurel) {
        <path class="year-badge__laurel" d="M15 13 C6.5 20, 6.5 36, 15 43" />
        <path class="year-badge__laurel" d="M33 13 C41.5 20, 41.5 36, 33 43" />
        <text class="year-badge__laurel-count" dominant-baseline="central" text-anchor="middle" x="24" y="28.5">{{ laurelNumber() }}</text>
      }
      @default {
        <path class="year-badge__medal-ribbon" d="M-5.5 0 L5.5 0 L3.8 21 L0 15.5 L-3.8 21 Z" transform="translate(17.5 30) rotate(16)" />
        <path class="year-badge__medal-ribbon" d="M-5.5 0 L5.5 0 L3.8 21 L0 15.5 L-3.8 21 Z" transform="translate(30.5 30) rotate(-16)" />
        <circle class="year-badge__medal-scallop" cx="24" cy="26" pathLength="96" r="15" />
        <circle class="year-badge__medal-disc" cx="24" cy="26" r="15.5" />
        <circle class="year-badge__medal-ring" cx="24" cy="26" r="11.5" />
        <text class="year-badge__medal-number" dominant-baseline="central" text-anchor="middle" x="24" y="26.5">{{ tierNumber() }}</text>
      }
    }
  </svg>

  <span class="year-badge__text">
    <span class="year-badge__label">{{ label() }}</span>

    @if (rarityText(); as rarity) {
      <span class="year-badge__rarity">{{ rarity }}</span>
    }
  </span>
</span>
