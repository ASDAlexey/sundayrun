<form class="event-form" [formGroup]="form">
  <mat-form-field appearance="outline" class="event-form__field">
    <mat-label class="event-form__label" i18n="@@preview.event.number">Номер забега</mat-label>

    <input class="event-form__input" formControlName="number" matInput min="1" type="number" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="event-form__field">
    <mat-label class="event-form__label" i18n="@@preview.event.date">Дата</mat-label>

    <input class="event-form__input" formControlName="dateIso" matInput type="date" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="event-form__field">
    <mat-label class="event-form__label" i18n="@@preview.event.city">Город</mat-label>

    <input class="event-form__input" formControlName="city" matInput type="text" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="event-form__field">
    <mat-label class="event-form__label" i18n="@@preview.event.park">Парк</mat-label>

    <input class="event-form__input" formControlName="park" matInput type="text" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="event-form__field">
    <mat-label class="event-form__label" i18n="@@preview.event.club">Клуб</mat-label>

    <input class="event-form__input" formControlName="clubName" matInput type="text" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="event-form__field">
    <mat-label class="event-form__label" i18n="@@preview.event.chairman">Председатель клуба</mat-label>

    <input class="event-form__input" formControlName="chairman" matInput type="text" />
  </mat-form-field>
</form>
