<div class="race-card">
  <div class="race-card__info">
    <h3 class="race-card__title" i18n="@@races.raceTitle">Пробег № {{ race().number }}</h3>

    <p class="race-card__date">{{ race().dateLong }}</p>

    <p class="race-card__place">{{ race().city }}, {{ race().park }}</p>

    <p class="race-card__count" i18n="@@races.participantCount">Участников: {{ race().participantCount }}</p>
  </div>

  <div class="race-card__actions">
    <a class="race-card__protocol" i18n="@@races.protocolOnline" [routerLink]="race().protocolLink">Протокол онлайн</a>

    <a
      class="race-card__pdf"
      i18n="@@races.pdf"
      rel="noopener"
      target="_blank"
      [attr.aria-label]="race().pdfAriaLabel"
      [href]="race().pdfUrl"
    >
      PDF
    </a>
  </div>
</div>
